<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact Manager | Task 03</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="page">
    <div class="card">
      <div class="header">
        <span class="badge">Task 03</span>
        <h1>Contact Manager</h1>
        <p class="subtitle">Add, view, edit and delete your contacts. Saved in your browser.</p>
      </div>

      <form id="contact-form" class="form">
        <input type="hidden" id="edit-id" value="" />
        <div class="field">
          <label for="name">Name</label>
          <input type="text" id="name" placeholder="e.g. Mansi Sharma" required />
        </div>
        <div class="field">
          <label for="phone">Phone</label>
          <input type="tel" id="phone" placeholder="e.g. +91 98765 43210" required />
        </div>
        <div class="field">
          <label for="email">Email</label>
          <input type="email" id="email" placeholder="e.g. mansi@example.com" required />
        </div>
        <div id="error" class="error" style="display:none"></div>
        <div class="actions">
          <button type="submit" id="submit-btn" class="btn primary">Add Contact</button>
          <button type="button" id="cancel-btn" class="btn ghost" style="display:none">Cancel</button>
        </div>
      </form>

      <div class="toolbar">
        <input type="text" id="search" placeholder="Search by name, phone, or email..." />
        <span id="count" class="count">0 contacts</span>
      </div>

      <ul id="contact-list" class="list"></ul>
      <div id="empty" class="empty">No contacts yet. Add your first one above.</div>
    </div>

    <footer class="footer">Made by Mansi — Prodigy InfoTech Software Development Internship — Task 03</footer>
  </div>

  <script src="script.js"></script>
</body>
</html>
